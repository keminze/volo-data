name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # 后端任务：Python 环境、Lint、Type Check、Test
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install black isort ruff mypy pytest pytest-cov

      - name: Lint
        run: |
          black --check services routers middlewares config
          isort --check-only services routers middlewares config
          ruff check services routers middlewares config

      - name: Type check
        run: |
          mypy services routers middlewares config

      - name: Test
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term

  # 前端任务：Node 环境、Lint (修复版)、Build
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --include=optional

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Build
        working-directory: ./frontend
        run: npm run build