name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # 后端任务：Python 环境、Lint、Type Check、Test
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install black isort ruff mypy pytest pytest-cov

      - name: Lint
        run: |
          black --check services routers middlewares config
          isort --check-only services routers middlewares config
          ruff check services routers middlewares config

      - name: Type check
        run: |
          mypy services routers middlewares config

      - name: Test
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term

  frontend:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'
            cache-dependency-path: frontend/package-lock.json

        - name: Cache Next.js build
          uses: actions/cache@v4
          with:
            path: frontend/.next/cache
            # 优化 key 值，加入 node 版本防止冲突
            key: ${{ runner.os }}-node-${{ steps.setup-node.outputs.node-version }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**/*.{js,jsx,ts,tsx}') }}
            restore-keys: |
              ${{ runner.os }}-node-${{ steps.setup-node.outputs.node-version }}-nextjs-

        - name: Install dependencies
          working-directory: ./frontend
          # 建议增加 --legacy-peer-deps 解决可能存在的 UI 库冲突
          run: npm ci --include=optional --legacy-peer-deps

        - name: Build
          working-directory: ./frontend
          # 如果你的项目需要环境变量才能构建，请在此处列出
          # env:
          #   NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          run: npm run build